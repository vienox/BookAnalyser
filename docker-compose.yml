services:
  backend:
    build: .
    container_name: opinie_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/opinie_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: opinie_db
    environment:
      POSTGRES_DB: opinie_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
